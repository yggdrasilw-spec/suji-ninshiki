<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>手書き数字データ収集</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
  text-align:center;
}

#wrap{
  max-width:760px;
  margin:auto;
  background:white;
  border-radius:20px;
  padding:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

#board{
  max-width:560px;
  margin:auto;
}

canvas{
  touch-action:none;
}

#canvas{
  width:100%;
  aspect-ratio:2/1;
  background:white;
  border:3px solid #ddd;
  border-radius:14px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:999px;
  font-size:18px;
  cursor:pointer;
  margin:6px;
}

.primary{
  background:#4caf50;
  color:white;
}

.gray{
  background:#ddd;
}

.digits{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  max-width:400px;
  margin:20px auto;
}

.digitBtn{
  font-size:28px;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#ffcc80;
}

#preview canvas{
  width:140px;
  height:140px;
  image-rendering:pixelated;
  border:1px solid #ccc;
  background:white;
}

textarea{
  width:100%;
  height:140px;
  margin-top:20px;
}

#prediction{
  font-size:48px;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="wrap">

<h1>✏️ 手書き数字データ収集</h1>

<p>
1ストローク終了ごとに自動認識します。<br>
保存されるのは28x28前処理済みデータです。
</p>

<div id="board">
  <canvas id="canvas" width="560" height="280"></canvas>
</div>

<div>
  <button class="gray" onclick="clearCanvas()">🗑 消す</button>
</div>

<div id="preview" style="margin-top:20px;">
  <div>モデル入力画像（28x28）</div>
  <canvas id="debug" width="28" height="28"></canvas>
</div>

<div style="margin-top:20px;">
  AI認識結果
</div>

<div id="prediction">?</div>

<div>
  信頼度:
  <span id="confidence">-</span>
</div>

<div style="margin-top:20px;">
正しい数字ラベルを押してください
</div>

<div class="digits">
  <button class="digitBtn" onclick="saveLabel(0)">0</button>
  <button class="digitBtn" onclick="saveLabel(1)">1</button>
  <button class="digitBtn" onclick="saveLabel(2)">2</button>
  <button class="digitBtn" onclick="saveLabel(3)">3</button>
  <button class="digitBtn" onclick="saveLabel(4)">4</button>
  <button class="digitBtn" onclick="saveLabel(5)">5</button>
  <button class="digitBtn" onclick="saveLabel(6)">6</button>
  <button class="digitBtn" onclick="saveLabel(7)">7</button>
  <button class="digitBtn" onclick="saveLabel(8)">8</button>
  <button class="digitBtn" onclick="saveLabel(9)">9</button>
</div>

<div style="margin-top:14px;font-size:24px;font-weight:bold;">
保存数: <span id="savedCount">0</span>
</div>

<div style="margin-top:20px;">
  <button class="primary" onclick="downloadJSONL()">
    ⬇ dataset.jsonl ダウンロード
  </button>
</div>

<textarea id="log" readonly></textarea>

</div>

<script>

let model = null;

async function loadModel(){
  try{
    model = await tf.loadGraphModel("./model/model.json");
    console.log("model loaded");
  }catch(e){
    console.error(e);
  }
}

loadModel();

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const debugCanvas = document.getElementById("debug");
const dctx = debugCanvas.getContext("2d");

ctx.fillStyle = "white";
ctx.fillRect(0,0,560,280);

let drawing = false;

let currentPixels = null;
let predictedDigit = null;
let predictedConfidence = null;

let dataset = [];

function getPos(e){

  const rect = canvas.getBoundingClientRect();

  if(e.touches && e.touches.length){
    return {
      x:(e.touches[0].clientX - rect.left) * (560/rect.width),
      y:(e.touches[0].clientY - rect.top) * (280/rect.height)
    };
  }

  return {
    x:(e.clientX - rect.left) * (560/rect.width),
    y:(e.clientY - rect.top) * (280/rect.height)
  };
}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
canvas.addEventListener("mouseup",end);
canvas.addEventListener("mouseleave",end);

canvas.addEventListener("touchstart",start,{passive:false});
canvas.addEventListener("touchmove",move,{passive:false});
canvas.addEventListener("touchend",end,{passive:false});

function start(e){

  drawing = true;

  const p = getPos(e);

  ctx.beginPath();
  ctx.arc(p.x,p.y,10,0,Math.PI*2);

  ctx.fillStyle = "black";
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}

function move(e){

  if(!drawing) return;

  e.preventDefault();

  const p = getPos(e);

  ctx.lineWidth = 22;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "black";

  ctx.lineTo(p.x,p.y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}

async function end(){

  if(!drawing) return;

  drawing = false;

  ctx.beginPath();

  await recognizeDigit();
}

function findBoundingBox(){

  const img = ctx.getImageData(0,0,560,280);

  const data = img.data;

  let minX = 9999;
  let minY = 9999;
  let maxX = -1;
  let maxY = -1;

  for(let y=0;y<280;y++){

    for(let x=0;x<560;x++){

      const i = (y * 560 + x) * 4;

      const r = data[i];

      if(r < 240){

        if(x < minX) minX = x;
        if(y < minY) minY = y;
        if(x > maxX) maxX = x;
        if(y > maxY) maxY = y;
      }
    }
  }

  if(maxX < 0){
    return null;
  }

  const padding = 20;

  minX = Math.max(0, minX - padding);
  minY = Math.max(0, minY - padding);

  maxX = Math.min(559, maxX + padding);
  maxY = Math.min(279, maxY + padding);

  return {
    x:minX,
    y:minY,
    w:maxX - minX + 1,
    h:maxY - minY + 1
  };
}

function drawDebug(tensor){

  const data = tensor.dataSync();

  const imageData = dctx.createImageData(28,28);

  for(let i=0;i<28*28;i++){

    const v = Math.floor(data[i] * 255);

    imageData.data[i*4+0] = v;
    imageData.data[i*4+1] = v;
    imageData.data[i*4+2] = v;
    imageData.data[i*4+3] = 255;
  }

  dctx.putImageData(imageData,0,0);
}

function preprocess(box){

  return tf.tidy(() => {

    let img = tf.browser.fromPixels(canvas,1);

    img = tf.slice(
      img,
      [box.y, box.x, 0],
      [box.h, box.w, 1]
    );

    const h = img.shape[0];
    const w = img.shape[1];

    const side = Math.max(w,h);

    const margin = Math.floor(side * 0.25);

    const full = side + margin * 2;

    let bg = tf.fill([full,full,1],255).bufferSync();

    const src = img.arraySync();

    const top = Math.floor((full - h) / 2);
    const left = Math.floor((full - w) / 2);

    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        bg.set(src[y][x][0], y + top, x + left, 0);
      }
    }

    img = bg.toTensor();

    img = tf.image.resizeBilinear(img,[20,20]);

    let finalBg = tf.fill([28,28,1],255).bufferSync();

    const resized = img.arraySync();

    for(let y=0;y<20;y++){
      for(let x=0;x<20;x++){
        finalBg.set(resized[y][x][0], y+4, x+4, 0);
      }
    }

    img = finalBg.toTensor();

    img = tf.sub(255,img);

    img = img.toFloat().div(255);

    drawDebug(img);

    return img;
  });
}

async function recognizeDigit(){

  const box = findBoundingBox();

  if(!box){
    return;
  }

  const tensor = preprocess(box);

  currentPixels = Array.from(await tensor.data());

  if(model){

    const input = tensor.expandDims(0);

    let output;

    if(model.predict){
      output = model.predict(input);
    }else{
      output = model.execute(input);
    }

    const data = await output.data();

    let max = data[0];
    let idx = 0;

    for(let i=1;i<10;i++){
      if(data[i] > max){
        max = data[i];
        idx = i;
      }
    }

    predictedDigit = idx;
    predictedConfidence = max;

    document.getElementById("prediction").innerText = idx;

    document.getElementById("confidence").innerText =
      (max * 100).toFixed(1) + "%";

    input.dispose();
    output.dispose();
  }

  tensor.dispose();
}

function saveLabel(label){

  if(!currentPixels){
    alert("数字を書いてください");
    return;
  }

  const sample = {
    label,
    predicted:predictedDigit,
    confidence:predictedConfidence,
    hardExample:(predictedDigit !== label),
    pixels:currentPixels,
    timestamp:Date.now()
  };

  dataset.push(sample);

  document.getElementById("savedCount").innerText =
    dataset.length;

  document.getElementById("log").value +=
    JSON.stringify(sample) + "\n";

  clearCanvas();
}

function clearCanvas(){

  ctx.fillStyle = "white";
  ctx.fillRect(0,0,560,280);

  dctx.clearRect(0,0,28,28);

  currentPixels = null;
  predictedDigit = null;
  predictedConfidence = null;

  document.getElementById("prediction").innerText = "?";
  document.getElementById("confidence").innerText = "-";
}

function downloadJSONL(){

  if(dataset.length === 0){
    alert("データがありません");
    return;
  }

  const lines = dataset.map(v => JSON.stringify(v));

  const blob = new Blob(
    [lines.join("\n")],
    {type:"application/json"}
  );

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = url;
  a.download = "dataset.jsonl";

  a.click();

  URL.revokeObjectURL(url);
}

</script>

</body>
</html>
