<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>手書き数字データ収集</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
  text-align:center;
}

#wrap{
  max-width:720px;
  margin:auto;
  background:white;
  border-radius:20px;
  padding:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

h1{
  margin-top:0;
}

#board{
  position:relative;
  width:100%;
  max-width:560px;
  margin:auto;
}

canvas{
  touch-action:none;
}

#canvas{
  width:100%;
  height:auto;
  aspect-ratio:500 / 240;
  background:white;
  border:3px solid #ddd;
  border-radius:14px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:999px;
  font-size:18px;
  cursor:pointer;
  margin:6px;
}

.primary{
  background:#4caf50;
  color:white;
}

.gray{
  background:#ddd;
}

.digits{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  max-width:400px;
  margin:20px auto;
}

.digitBtn{
  font-size:28px;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#ffcc80;
}

#preview{
  margin-top:20px;
}

#preview canvas{
  width:140px;
  height:140px;
  image-rendering:pixelated;
  border:1px solid #ccc;
  background:white;
}

#info{
  margin-top:12px;
  color:#555;
  line-height:1.7;
}

#count{
  font-size:22px;
  font-weight:bold;
  margin-top:14px;
}

textarea{
  width:100%;
  height:120px;
  margin-top:20px;
}
</style>
</head>
<body>

<div id="wrap">

<h1>✏️ 手書き数字データ収集</h1>

<p>
追加学習用の教師データを保存します。<br>
保存されるのは preprocess 後の 28x28 データです。
</p>

<div id="board">
  <canvas id="canvas" width="560" height="280"></canvas>
</div>

<div>
  <button class="gray" onclick="clearCanvas()">🗑 消す</button>
  <button class="primary" onclick="prepareSample()">📦 サンプル化</button>
</div>

<div id="preview">
  <div>モデルへ入力される28x28画像</div>
  <canvas id="debug" width="28" height="28"></canvas>
</div>

<div id="info">
  描いた数字の正解ラベルを押してください
</div>

<div style="margin-top:12px;font-size:28px;font-weight:bold;">
  AI認識結果: <span id="prediction">?</span>
</div>

<div style="margin-top:6px;color:#666;">
  信頼度: <span id="confidence">-</span>
</div>

<div class="digits">
  <button class="digitBtn" onclick="saveLabel(0)">0</button>
  <button class="digitBtn" onclick="saveLabel(1)">1</button>
  <button class="digitBtn" onclick="saveLabel(2)">2</button>
  <button class="digitBtn" onclick="saveLabel(3)">3</button>
  <button class="digitBtn" onclick="saveLabel(4)">4</button>
  <button class="digitBtn" onclick="saveLabel(5)">5</button>
  <button class="digitBtn" onclick="saveLabel(6)">6</button>
  <button class="digitBtn" onclick="saveLabel(7)">7</button>
  <button class="digitBtn" onclick="saveLabel(8)">8</button>
  <button class="digitBtn" onclick="saveLabel(9)">9</button>
</div>

<div id="count">保存数: 0</div>

<div style="margin-top:24px;">
  <button class="primary" onclick="downloadJSONL()">
    ⬇ dataset.jsonl ダウンロード
  </button>
</div>

<textarea id="log" readonly></textarea>

</div>

<script>

async function loadModel(){
  try{
    model = await tf.loadGraphModel("./model/model.json");
    console.log("model loaded");
  }catch(e){
    console.error(e);
  }
}

loadModel();
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const debugCanvas = document.getElementById("debug");
const dctx = debugCanvas.getContext("2d");

const logArea = document.getElementById("log");
const countEl = document.getElementById("count");

ctx.fillStyle = "white";
ctx.fillRect(0,0,560,280);

let drawing = false;
let minX,maxX,minY,maxY;

// 全ストローク共通bbox
let globalMinX, globalMaxX, globalMinY, globalMaxY;

let currentPixels = null;
let predictedDigit = null;
let predictedConfidence = null;
let model = null;

let dataset = [];

resetGlobalBox();

// =====================
function resetGlobalBox(){
  globalMinX = 9999;
  globalMinY = 9999;
  globalMaxX = -1;
  globalMaxY = -1;
}

function updateGlobalBox(x,y){
  if(x < globalMinX) globalMinX = x;
  if(y < globalMinY) globalMinY = y;
  if(x > globalMaxX) globalMaxX = x;
  if(y > globalMaxY) globalMaxY = y;
}

function resetBox(){
  minX = 9999;
  minY = 9999;
  maxX = -1;
  maxY = -1;
}

function updateBox(x,y){
  if(x < minX) minX = x;
  if(y < minY) minY = y;
  if(x > maxX) maxX = x;
  if(y > maxY) maxY = y;
}

function getPos(e){
  const rect = canvas.getBoundingClientRect();

  if(e.touches && e.touches.length){
    return {
      x:(e.touches[0].clientX - rect.left) * (560/rect.width),
      y:(e.touches[0].clientY - rect.top) * (280/rect.height)
    };
  }

  return {
    x:(e.clientX - rect.left) * (560/rect.width),
    y:(e.clientY - rect.top) * (280/rect.height)
  };
}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
canvas.addEventListener("mouseup",end);
canvas.addEventListener("mouseleave",end);

canvas.addEventListener("touchstart",start,{passive:false});
canvas.addEventListener("touchmove",move,{passive:false});
canvas.addEventListener("touchend",end,{passive:false});

function start(e){
  drawing = true;
  resetBox();
  resetGlobalBox();

  const p = getPos(e);

  updateBox(p.x,p.y);
  updateGlobalBox(p.x,p.y);

  ctx.beginPath();
  ctx.arc(p.x,p.y,8,0,Math.PI*2);
  ctx.fillStyle = "black";
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}

function move(e){
  if(!drawing) return;

  e.preventDefault();

  const p = getPos(e);

  updateBox(p.x,p.y);
  updateGlobalBox(p.x,p.y);

  ctx.lineWidth = 20;
  ctx.lineCap = "round";
  ctx.strokeStyle = "black";

  ctx.lineTo(p.x,p.y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}

function end(){
  if(!drawing) return;

  drawing = false;
  ctx.beginPath();
}

function getBox(){
  const p = 14;

  // 全ストロークをまとめたbboxを使う
  let x = globalMinX - p;
  let y = globalMinY - p;
  let w = (globalMaxX - globalMinX) + p*2;
  let h = (globalMaxY - globalMinY) + p*2;

  x = Math.max(0,x);
  y = Math.max(0,y);

  if(x+w > 560) w = 560 - x;
  if(y+h > 280) h = 280 - y;

  return {x,y,w,h};
}

function preprocess(box){
  return tf.tidy(() => {

    let img = tf.browser.fromPixels(canvas,1);

    img = tf.slice(
      img,
      [Math.floor(box.y), Math.floor(box.x), 0],
      [Math.max(1,Math.floor(box.h)), Math.max(1,Math.floor(box.w)), 1]
    );

    const h = img.shape[0];
    const w = img.shape[1];

    const side = Math.max(h,w);
    const pad = Math.floor(side * 0.1);
    const full = side + pad*2;

    let bg = tf.fill([full,full,1],255).bufferSync();
    const src = img.arraySync();

    const top = Math.floor((full-h)/2);
    const left = Math.floor((full-w)/2);

    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        bg.set(src[y][x][0], y+top, x+left, 0);
      }
    }

    img = bg.toTensor();

    img = tf.image.resizeBilinear(img,[28,28]);

    img = tf.sub(255,img);

    img = img.toFloat().div(255);

    drawDebug(img);

    return img;
  });
}

function drawDebug(tensor){

  const data = tensor.dataSync();

  const imageData = dctx.createImageData(28,28);

  for(let i=0;i<28*28;i++){

    const v = Math.floor(data[i] * 255);

    imageData.data[i*4+0] = v;
    imageData.data[i*4+1] = v;
    imageData.data[i*4+2] = v;
    imageData.data[i*4+3] = 255;
  }

  dctx.putImageData(imageData,0,0);
}

async function prepareSample(){

  const box = getBox();

  const tensor = preprocess(box);

  const arr = Array.from(await tensor.data());

  currentPixels = arr;

  if(model){

    const input = tensor.expandDims(0);

    let output = model.predict ?
      model.predict(input) :
      model.execute(input);

    const data = await output.data();

    let max = data[0];
    let idx = 0;

    for(let i=1;i<10;i++){
      if(data[i] > max){
        max = data[i];
        idx = i;
      }
    }

    predictedDigit = idx;
    predictedConfidence = max;

    document.getElementById("prediction").innerHTML = idx;
    document.getElementById("confidence").innerHTML =
      (max * 100).toFixed(1) + "%";

    input.dispose();
    output.dispose();
  }

  tensor.dispose();

  document.getElementById("info").innerHTML =
    "正しい数字ラベルを押してください";
}

function saveLabel(label){

  if(!currentPixels){
    alert("先に『サンプル化』してください");
    return;
  }

  const sample = {
    label:label,
    predicted:predictedDigit,
    confidence:predictedConfidence,
    hardExample:(predictedDigit !== label),
    pixels:currentPixels,
    timestamp:Date.now()
  };

  dataset.push(sample);

  countEl.innerHTML = `保存数: ${dataset.length}`;

  logArea.value += JSON.stringify(sample) + "\n";

  currentPixels = null;

  clearCanvas();

  document.getElementById("info").innerHTML =
    `保存完了 → ラベル ${label}`;

  resetGlobalBox();
}

function downloadJSONL(){

  if(dataset.length === 0){
    alert("データがありません");
    return;
  }

  const lines = dataset.map(v => JSON.stringify(v));

  const blob = new Blob(
    [lines.join("\n")],
    {type:"application/json"}
  );

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = url;
  a.download = "dataset.jsonl";

  a.click();

  URL.revokeObjectURL(url);
}

function clearCanvas(){

  ctx.fillStyle = "white";
  ctx.fillRect(0,0,560,280);

  dctx.clearRect(0,0,28,28);

  document.getElementById("prediction").innerHTML = "?";
  document.getElementById("confidence").innerHTML = "-";

  currentPixels = null;
  predictedDigit = null;
  predictedConfidence = null;

  resetBox();
}
</script>

</body>
</html>
