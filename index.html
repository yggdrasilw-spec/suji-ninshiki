<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>手書き数字認識（2桁入力版）</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<style>
body{
font-family:sans-serif;
background:#f7f7f7;
text-align:center;
padding:20px;
margin:0;
}

h1{
color:#ff7043;
margin-bottom:5px;
}

p{
color:#666;
margin-top:0;
}

#wrap{
max-width:520px;
margin:auto;
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
}

canvas{
background:black;
border:3px solid #ffccbc;
border-radius:12px;
touch-action:none;
width:100%;
max-width:500px;
height:220px;
}

button{
padding:12px 20px;
font-size:18px;
margin:10px 5px;
border:none;
border-radius:999px;
cursor:pointer;
}

.btn2{
background:#ddd;
}

#msg{
font-weight:bold;
margin:12px 0;
color:#333;
}

#result{
font-size:64px;
font-weight:bold;
color:#ff7043;
margin-top:10px;
}

#sub{
font-size:18px;
color:#666;
}

#mini{
font-size:14px;
color:#888;
margin-top:8px;
line-height:1.6;
}
</style>
</head>
<body>

<div id="wrap">

<h1>✏️ 手書き数字認識</h1>
<p>Google Colab 学習モデル版（2桁入力）</p>

<div id="msg">① モデル読み込み中...</div>

<canvas id="canvas" width="500" height="220"></canvas>

<div>
<button class="btn2" onclick="clearCanvas()">🗑 消す</button>
</div>

<div id="sub">② 認識結果</div>
<div id="result">?</div>
<div id="mini">十の位から書いてください</div>

</div>

<script>
let model;

// =====================================================
// モデル読み込み（既存コード維持）
// =====================================================
async function loadModel(){
try{
model=await tf.loadGraphModel("./model/model.json");
document.getElementById("msg").innerHTML="✅ モデル読み込み成功";
}catch(e){
console.error(e);
document.getElementById("msg").innerHTML="❌ 読み込み失敗<br>"+e.message;
}
}
loadModel();

// =====================================================
// キャンバス設定
// =====================================================
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

let drawing=false;
let autoTimer=null;

// =====================================================
// 2桁入力状態管理
//
// phase=0 → 十の位待ち
// phase=1 → 一の位待ち
// =====================================================
let phase=0;

let tensDigit=null;
let onesDigit=null;

// =====================================================
// 座標取得
// =====================================================
function getPos(e){

const rect=canvas.getBoundingClientRect();

if(e.touches){
return{
x:(e.touches[0].clientX-rect.left)*(canvas.width/rect.width),
y:(e.touches[0].clientY-rect.top)*(canvas.height/rect.height)
};
}else{
return{
x:(e.clientX-rect.left)*(canvas.width/rect.width),
y:(e.clientY-rect.top)*(canvas.height/rect.height)
};
}
}

// =====================================================
// イベント登録
// =====================================================
canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
canvas.addEventListener("mouseup",end);
canvas.addEventListener("mouseleave",end);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",move);
canvas.addEventListener("touchend",end);

// =====================================================
// 描画開始
// =====================================================
function start(e){

drawing=true;
clearTimeout(autoTimer);
draw(e);
}

// =====================================================
// 描画中
// =====================================================
function move(e){
if(!drawing)return;
draw(e);
}

// =====================================================
// 描画終了
//
// ストローク終了後500ms待って認識
// =====================================================
function end(){

if(!drawing)return;

drawing=false;
ctx.beginPath();

autoTimer=setTimeout(()=>{
judgeCurrentInput();
},500);
}

// =====================================================
// 描画処理
// =====================================================
function draw(e){

e.preventDefault();

const p=getPos(e);

ctx.lineWidth=20;
ctx.lineCap="round";
ctx.strokeStyle="white";

ctx.lineTo(p.x,p.y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(p.x,p.y);
}

// =====================================================
// 現在の段階に応じて認識
// phase0=十の位
// phase1=一の位
// =====================================================
async function judgeCurrentInput(){

if(phase===0){

tensDigit=await predict();
phase=1;

document.getElementById("mini").innerHTML=
"十の位 = "+tensDigit+
"<br>次は一の位を書いてください";

clearCanvasOnly();

}else{

onesDigit=await predict();

const finalNumber=(tensDigit*10)+onesDigit;

document.getElementById("result").innerHTML=finalNumber;

document.getElementById("mini").innerHTML=
"十の位="+tensDigit+
" / 一の位="+onesDigit+
"<br>完成！";

phase=2;
}
}

// =====================================================
// キャンバスだけ消去
// 認識結果は残す
// =====================================================
function clearCanvasOnly(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);
}

// =====================================================
// 全消去
// =====================================================
function clearCanvas(){

clearTimeout(autoTimer);

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

document.getElementById("result").innerHTML="?";
document.getElementById("mini").innerHTML="十の位から書いてください";

phase=0;
tensDigit=null;
onesDigit=null;
}

// =====================================================
// 前処理（既存コード維持）
// =====================================================
function preprocess(){
return tf.tidy(()=>{

let img=tf.browser.fromPixels(canvas,1);

img=tf.image.resizeBilinear(img,[28,28]);

img=img.toFloat().div(255.0);

img=img.expandDims(0);

return img;

});
}

// =====================================================
// 認識（既存コード維持）
// 戻り値で数字返却
// =====================================================
async function predict(){

if(!model)return 0;

const input=preprocess();

let output=model.predict ?
model.predict(input) :
model.execute(input);

const data=await output.data();

let max=data[0];
let idx=0;

for(let i=1;i<10;i++){
if(data[i]>max){
max=data[i];
idx=i;
}
}

input.dispose();
output.dispose();

return idx;
}
</script>

</body>
</html>
