<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>手書き数字認識（最終精度改善版）</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<style>
body{
font-family:sans-serif;
background:#f7f7f7;
text-align:center;
padding:20px;
margin:0;
}
h1{color:#ff7043;margin-bottom:5px;}
p{color:#666;margin-top:0;}

#wrap{
max-width:520px;
margin:auto;
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
}

#board{
position:relative;
width:100%;
max-width:500px;
margin:auto;
}

canvas{
touch-action:none;
width:100%;
height:220px;
border-radius:12px;
display:block;
}

#canvas{
background:white;
border:3px solid #ffccbc;
position:relative;
z-index:1;
}

#overlay{
position:absolute;
left:0;
top:0;
z-index:2;
pointer-events:none;
}

button{
padding:12px 20px;
font-size:18px;
margin:10px 5px;
border:none;
border-radius:999px;
cursor:pointer;
}

.btn2{background:#ddd;}

#msg{
font-weight:bold;
margin:12px 0;
color:#333;
}

#result{
font-size:64px;
font-weight:bold;
color:#ff7043;
margin-top:10px;
}

#mini{
font-size:14px;
color:#777;
line-height:1.6;
margin-top:8px;
}
</style>
</head>
<body>

<div id="wrap">

<h1>✏️ 手書き数字認識</h1>
<p>最終精度改善版</p>

<div id="msg">① モデル読み込み中...</div>

<div id="board">
<canvas id="canvas" width="500" height="220"></canvas>
<canvas id="overlay" width="500" height="220"></canvas>
</div>

<div>
<button class="btn2" onclick="clearCanvas()">🗑 消す</button>
</div>

<div id="result">?</div>
<div id="mini">十の位から書いてください</div>

</div>

<script>
let model;

// =====================================================
// モデル読み込み
// =====================================================
async function loadModel(){
try{
model=await tf.loadGraphModel("./model/model.json");
msg.innerHTML="✅ モデル読み込み成功";
}catch(e){
msg.innerHTML="❌ 読み込み失敗";
}
}
loadModel();

// =====================================================
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const overlay=document.getElementById("overlay");
const octx=overlay.getContext("2d");

const msg=document.getElementById("msg");
const result=document.getElementById("result");
const mini=document.getElementById("mini");

// =====================================================
ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

let drawing=false;
let phase=0;
let tensDigit=null;
let onesDigit=null;

let stroke1Box=null;
let stroke2Box=null;

// =====================================================
function getPos(e){
const rect=canvas.getBoundingClientRect();

if(e.touches && e.touches.length){
return{
x:(e.touches[0].clientX-rect.left)*(canvas.width/rect.width),
y:(e.touches[0].clientY-rect.top)*(canvas.height/rect.height)
};
}

return{
x:(e.clientX-rect.left)*(canvas.width/rect.width),
y:(e.clientY-rect.top)*(canvas.height/rect.height)
};
}

// =====================================================
let minX,maxX,minY,maxY;

function resetBox(){
minX=9999; minY=9999;
maxX=-1; maxY=-1;
}

function updateBox(x,y){
if(x<minX)minX=x;
if(y<minY)minY=y;
if(x>maxX)maxX=x;
if(y>maxY)maxY=y;
}

function getCurrentBox(){
return{
x:minX,
y:minY,
w:Math.max(8,maxX-minX),
h:Math.max(8,maxY-minY)
};
}

// =====================================================
function expandBox(box,padX=22,padY=22){

let x=box.x-padX;
let y=box.y-padY;
let w=box.w+padX*2;
let h=box.h+padY*2;

if(x<0)x=0;
if(y<0)y=0;
if(x+w>canvas.width)w=canvas.width-x;
if(y+h>canvas.height)h=canvas.height-y;

return{x,y,w,h};
}

// =====================================================
function isTouch(a,b){
const pad=14;

return !(
a.x+a.w+pad < b.x ||
b.x+b.w+pad < a.x ||
a.y+a.h+pad < b.y ||
b.y+b.h+pad < a.y
);
}

// =====================================================
function drawBoxes(){

octx.clearRect(0,0,overlay.width,overlay.height);

// 緑枠
if(stroke1Box){
drawRect(expandBox(stroke1Box,10,10),"#00e676");
}

// 赤枠
let redBox=null;

if(stroke2Box){
redBox=expandBox(stroke2Box,10,10);

}else if(stroke1Box){

const gap=10;

redBox={
x:stroke1Box.x+stroke1Box.w+gap,
y:10,
w:canvas.width-(stroke1Box.x+stroke1Box.w+gap)-10,
h:canvas.height-20
};

if(redBox.w<20)redBox=null;
}

if(redBox){
drawRect(redBox,"#ff5252");
}
}

// =====================================================
function drawRect(box,color){
octx.strokeStyle=color;
octx.lineWidth=2;
octx.setLineDash([8,5]);
octx.strokeRect(box.x,box.y,box.w,box.h);
octx.setLineDash([]);
}

// =====================================================
canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
canvas.addEventListener("mouseup",end);
canvas.addEventListener("mouseleave",end);

canvas.addEventListener("touchstart",start,{passive:false});
canvas.addEventListener("touchmove",move,{passive:false});
canvas.addEventListener("touchend",end,{passive:false});

// =====================================================
function start(e){
if(phase===3)return;

drawing=true;
resetBox();
ctx.beginPath();
draw(e);
}

function move(e){
if(!drawing)return;
draw(e);
}

async function end(){

if(!drawing)return;

drawing=false;
ctx.beginPath();

const box=getCurrentBox();

// 1本目
if(phase===0){

stroke1Box=expandBox(box,22,22);
drawBoxes();

tensDigit=await predict();
result.innerHTML=tensDigit;
mini.innerHTML="十の位 仮認識 = "+tensDigit;

phase=1;
return;
}

// 2本目
if(phase===1){

stroke2Box=expandBox(box,22,22);

if(isTouch(stroke1Box,stroke2Box)){

stroke1Box=mergeBox(stroke1Box,stroke2Box);
stroke2Box=null;

drawBoxes();

tensDigit=await predict();

result.innerHTML=tensDigit;
mini.innerHTML="十の位 再認識確定 = "+tensDigit+"<br>一の位を書いてください";

phase=2;

}else{

drawBoxes();

onesDigit=await predict();

result.innerHTML=(tensDigit*10)+onesDigit;
mini.innerHTML="十="+tensDigit+" / 一="+onesDigit+" 仮";

phase=2;
}

return;
}

// 3本目
if(phase===2){

onesDigit=await predict();

result.innerHTML=(tensDigit*10)+onesDigit;
mini.innerHTML="十="+tensDigit+" / 一="+onesDigit+" 確定";

phase=3;
}
}

// =====================================================
function mergeBox(a,b){

const x=Math.min(a.x,b.x);
const y=Math.min(a.y,b.y);

const r=Math.max(a.x+a.w,b.x+b.w);
const bt=Math.max(a.y+a.h,b.y+b.h);

return{x,y,w:r-x,h:bt-y};
}

// =====================================================
function draw(e){

e.preventDefault();

const p=getPos(e);

updateBox(p.x,p.y);

ctx.lineWidth=20;
ctx.lineCap="round";
ctx.strokeStyle="black";

ctx.lineTo(p.x,p.y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(p.x,p.y);
}

// =====================================================
function clearCanvas(){

ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

octx.clearRect(0,0,overlay.width,overlay.height);

result.innerHTML="?";
mini.innerHTML="十の位から書いてください";

phase=0;
tensDigit=null;
onesDigit=null;
stroke1Box=null;
stroke2Box=null;
}

// =====================================================
// ★最終精度改善 前処理
// 画像認識コード本体は触らず preprocessのみ強化
// =====================================================
function getTargetBox(){

if(phase===0 && stroke1Box) return stroke1Box;
if(phase===1 && stroke2Box) return stroke2Box;
if(phase>=2 && stroke2Box) return stroke2Box;
if(stroke1Box) return stroke1Box;

return {x:0,y:0,w:canvas.width,h:canvas.height};
}

function preprocess(){
return tf.tidy(()=>{

const box=getTargetBox();

// 元画像切り出し
const src=tf.browser.fromPixels(canvas,1);

let crop=tf.slice(
src,
[Math.floor(box.y),Math.floor(box.x),0],
[
Math.max(1,Math.floor(box.h)),
Math.max(1,Math.floor(box.w)),
1
]
);

// 正方形サイズ
const side=Math.max(crop.shape[0],crop.shape[1]);

// 外周10%余白追加
const sidePad=Math.floor(side*0.10);
const finalSide=side + sidePad*2;

// 白背景キャンバスへ中央配置
let square=tf.fill([finalSide,finalSide,1],255);

const offsetY=Math.floor((finalSide-crop.shape[0])/2);
const offsetX=Math.floor((finalSide-crop.shape[1])/2);

square=square.pad([[0,0],[0,0],[0,0]]);
square=tf.tensor(square.arraySync());

const arr=square.arraySync();

const cropArr=crop.arraySync();

for(let y=0;y<crop.shape[0];y++){
for(let x=0;x<crop.shape[1];x++){
arr[y+offsetY][x+offsetX][0]=cropArr[y][x][0];
}
}

let img=tf.tensor(arr);

// 28x28縮小
img=tf.image.resizeBilinear(img,[28,28]);

// 白黒反転
img=tf.sub(255,img);

// 正規化
img=img.toFloat().div(255.0);

// batch化
img=img.expandDims(0);

return img;
});
}

// =====================================================
// 認識本体そのまま
// =====================================================
async function predict(){

if(!model)return 0;

const input=preprocess();

let output=model.predict ?
model.predict(input) :
model.execute(input);

const data=await output.data();

let max=data[0];
let idx=0;

for(let i=1;i<10;i++){
if(data[i]>max){
max=data[i];
idx=i;
}
}

input.dispose();
output.dispose();

return idx;
}
</script>

</body>
</html>
