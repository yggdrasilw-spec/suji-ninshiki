<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>手書き数字認識 完成版</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<style>
body{
font-family:sans-serif;
background:#f7f7f7;
text-align:center;
padding:20px;
margin:0;
}
#wrap{
max-width:560px;
margin:auto;
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
}
h1{margin:0;color:#ff7043;}
p{margin:6px 0 14px;color:#666;}
#board{
position:relative;
width:100%;
max-width:500px;
margin:auto;
}
canvas{
touch-action:none;
width:100%;
height:220px;
display:block;
border-radius:12px;
}
#canvas{
background:#fff;
border:3px solid #ffccbc;
}
#overlay{
position:absolute;
left:0;top:0;
pointer-events:none;
}
button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:999px;
background:#ddd;
margin-top:12px;
cursor:pointer;
}
#msg{font-weight:bold;margin:12px 0;}
#result{
font-size:64px;
font-weight:bold;
color:#ff7043;
}
#mini{
font-size:14px;
color:#666;
line-height:1.6;
margin-top:8px;
}
</style>
</head>
<body>

<div id="wrap">
<h1>✏️ 手書き数字認識</h1>
<p>完成版（高速入力対応・4ストローク対応）</p>

<div id="msg">モデル読み込み中...</div>

<div id="board">
<canvas id="canvas" width="500" height="220"></canvas>
<canvas id="overlay" width="500" height="220"></canvas>
</div>

<button onclick="clearCanvas()">🗑 消す</button>

<div id="result">?</div>
<div id="mini">十の位から書いてください</div>
</div>

<script>
let model;

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const overlay=document.getElementById("overlay");
const octx=overlay.getContext("2d");

const msg=document.getElementById("msg");
const result=document.getElementById("result");
const mini=document.getElementById("mini");

ctx.fillStyle="white";
ctx.fillRect(0,0,500,220);

let drawing=false;

let phase=0;
let totalStroke=0;

let tensDigit=null;
let onesDigit=null;

let stroke1Box=null;
let stroke2Box=null;

let minX,maxX,minY,maxY;

// ===============================
async function loadModel(){
try{
model=await tf.loadGraphModel("./model/model.json");
msg.innerHTML="✅ モデル読み込み成功";
}catch(e){
msg.innerHTML="❌ モデル読み込み失敗";
}
}
loadModel();

// ===============================
function resetBox(){
minX=9999;minY=9999;
maxX=-1;maxY=-1;
}

function updateBox(x,y){
if(x<minX)minX=x;
if(y<minY)minY=y;
if(x>maxX)maxX=x;
if(y>maxY)maxY=y;
}

function getBox(){
return{
x:minX,
y:minY,
w:Math.max(8,maxX-minX),
h:Math.max(8,maxY-minY)
};
}

function expandBox(b,p=18){
let x=b.x-p;
let y=b.y-p;
let w=b.w+p*2;
let h=b.h+p*2;

if(x<0)x=0;
if(y<0)y=0;
if(x+w>500)w=500-x;
if(y+h>220)h=220-y;

return{x,y,w,h};
}

function mergeBox(a,b){
const x=Math.min(a.x,b.x);
const y=Math.min(a.y,b.y);
const r=Math.max(a.x+a.w,b.x+b.w);
const bt=Math.max(a.y+a.h,b.y+b.h);
return{x,y,w:r-x,h:bt-y};
}

// ===============================
// 接触判定（かなり厳しく）
// ===============================
function isTouch(a,b){

const pad=3;

return !(
a.x+a.w+pad < b.x ||
b.x+b.w+pad < a.x ||
a.y+a.h+pad < b.y ||
b.y+b.h+pad < a.y
);
}

// ===============================
function getPos(e){

const rect=canvas.getBoundingClientRect();

if(e.touches && e.touches.length){
return{
x:(e.touches[0].clientX-rect.left)*(500/rect.width),
y:(e.touches[0].clientY-rect.top)*(220/rect.height)
};
}

return{
x:(e.clientX-rect.left)*(500/rect.width),
y:(e.clientY-rect.top)*(220/rect.height)
};
}

// ===============================
canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
canvas.addEventListener("mouseup",end);
canvas.addEventListener("mouseleave",end);

canvas.addEventListener("touchstart",start,{passive:false});
canvas.addEventListener("touchmove",move,{passive:false});
canvas.addEventListener("touchend",end,{passive:false});

// ===============================
function start(e){

drawing=true;
resetBox();

const p=getPos(e);

// 高速入力対策：開始点を即描画
updateBox(p.x,p.y);

ctx.beginPath();
ctx.arc(p.x,p.y,8,0,Math.PI*2);
ctx.fillStyle="black";
ctx.fill();

ctx.beginPath();
ctx.moveTo(p.x,p.y);
}

// ===============================
function move(e){
if(!drawing)return;
draw(e);
}

function draw(e){

e.preventDefault();

const p=getPos(e);

updateBox(p.x,p.y);

ctx.lineWidth=20;
ctx.lineCap="round";
ctx.strokeStyle="black";

ctx.lineTo(p.x,p.y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(p.x,p.y);
}

// ===============================
async function end(){

if(!drawing)return;

drawing=false;
ctx.beginPath();

totalStroke++;

const box=expandBox(getBox());

// --------------------
// 1本目 = 十の位開始
// --------------------
if(totalStroke===1){

stroke1Box=box;

drawBoxes();

tensDigit=await predict(stroke1Box);

result.innerHTML=tensDigit;
mini.innerHTML="十の位 仮認識 = "+tensDigit;
return;
}

// --------------------
// 2本目
// --------------------
if(totalStroke===2){

if(isTouch(stroke1Box,box)){

stroke1Box=mergeBox(stroke1Box,box);

drawBoxes();

tensDigit=await predict(stroke1Box);

result.innerHTML=tensDigit;
mini.innerHTML="十の位 更新 = "+tensDigit;
return;

}else{

stroke2Box=box;

drawBoxes();

onesDigit=await predict(stroke2Box);

result.innerHTML=(tensDigit*10)+onesDigit;
mini.innerHTML="一の位 開始";
return;
}
}

// --------------------
// 3本目
// --------------------
if(totalStroke===3){

// まだ一の位が無い場合
if(!stroke2Box){

stroke2Box=box;
drawBoxes();

onesDigit=await predict(stroke2Box);
result.innerHTML=(tensDigit*10)+onesDigit;
mini.innerHTML="一の位 認識";
return;
}

// 4,5,7なら4本目許可
if([4,5,7].includes(tensDigit) && isTouch(stroke1Box,box)){

stroke1Box=mergeBox(stroke1Box,box);

drawBoxes();

tensDigit=await predict(stroke1Box);

result.innerHTML=(tensDigit*10)+onesDigit;
mini.innerHTML="十の位 最終追記";
return;
}

// 通常は一の位確定
stroke2Box=mergeBox(stroke2Box,box);

drawBoxes();

onesDigit=await predict(stroke2Box);

result.innerHTML=(tensDigit*10)+onesDigit;
mini.innerHTML="確定";
return;
}

// --------------------
// 4本目
// --------------------
if(totalStroke===4){

if(stroke2Box){
stroke2Box=mergeBox(stroke2Box,box);

drawBoxes();

onesDigit=await predict(stroke2Box);

result.innerHTML=(tensDigit*10)+onesDigit;
mini.innerHTML="確定";
}
}
}

// ===============================
function drawBoxes(){

octx.clearRect(0,0,500,220);

if(stroke1Box) rect(stroke1Box,"#00e676");
if(stroke2Box) rect(stroke2Box,"#ff5252");
}

function rect(b,c){
octx.strokeStyle=c;
octx.lineWidth=2;
octx.setLineDash([8,5]);
octx.strokeRect(b.x,b.y,b.w,b.h);
octx.setLineDash([]);
}

// ===============================
function preprocess(box){

return tf.tidy(()=>{

let img=tf.browser.fromPixels(canvas,1);

img=tf.slice(
img,
[Math.floor(box.y),Math.floor(box.x),0],
[
Math.floor(box.h),
Math.floor(box.w),
1
]
);

const h=img.shape[0];
const w=img.shape[1];

const side=Math.max(h,w);
const pad=Math.floor(side*0.1);
const full=side+pad*2;

let bg=tf.fill([full,full,1],255).bufferSync();

const src=img.arraySync();

const top=Math.floor((full-h)/2);
const left=Math.floor((full-w)/2);

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){
bg.set(src[y][x][0],y+top,x+left,0);
}
}

img=bg.toTensor();

img=tf.image.resizeBilinear(img,[28,28]);

img=tf.sub(255,img);

img=img.toFloat().div(255);

img=img.expandDims(0);

return img;
});
}

// ===============================
async function predict(box){

if(!model)return 0;

const input=preprocess(box);

let output=model.predict?
model.predict(input):
model.execute(input);

const data=await output.data();

let max=data[0];
let idx=0;

for(let i=1;i<10;i++){
if(data[i]>max){
max=data[i];
idx=i;
}
}

input.dispose();
output.dispose();

return idx;
}

// ===============================
function clearCanvas(){

ctx.fillStyle="white";
ctx.fillRect(0,0,500,220);

octx.clearRect(0,0,500,220);

phase=0;
totalStroke=0;

tensDigit=null;
onesDigit=null;

stroke1Box=null;
stroke2Box=null;

result.innerHTML="?";
mini.innerHTML="十の位から書いてください";
}
</script>
</body>
</html>
