<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>手書き数字認識（GraphModel版）</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<style>
body{
font-family:sans-serif;
background:#f7f7f7;
text-align:center;
padding:20px;
margin:0;
}

h1{
color:#ff7043;
margin-bottom:5px;
}

p{
color:#666;
margin-top:0;
}

#wrap{
max-width:520px;
margin:auto;
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
}

canvas{
background:black;
border:3px solid #ffccbc;
border-radius:12px;
touch-action:none;
width:100%;
max-width:500px;
height:220px;
}

button{
padding:12px 20px;
font-size:18px;
margin:10px 5px;
border:none;
border-radius:999px;
cursor:pointer;
}

.btn1{
background:#ff7043;
color:white;
}

.btn2{
background:#ddd;
}

#msg{
font-weight:bold;
margin:12px 0;
color:#333;
}

#result{
font-size:64px;
font-weight:bold;
color:#ff7043;
margin-top:10px;
}

#sub{
font-size:18px;
color:#666;
}
</style>
</head>
<body>

<div id="wrap">

<h1>✏️ 手書き数字認識</h1>
<p>Google Colab 学習モデル版</p>

<div id="msg">① モデル読み込み中...</div>

<canvas id="canvas" width="500" height="220"></canvas>

<div>
<button class="btn2" onclick="clearCanvas()">🗑 消す</button>
<button class="btn1" onclick="predict()">🔍 認識する</button>
</div>

<div id="sub">③ 認識結果</div>
<div id="result">?</div>

</div>

<script>
let model;

// =====================================================
// モデル読み込み（GraphModel版）
// =====================================================
async function loadModel(){
try{
model = await tf.loadGraphModel("./model/model.json");
document.getElementById("msg").innerHTML="✅ モデル読み込み成功";
}catch(e){
console.error(e);
document.getElementById("msg").innerHTML="❌ 読み込み失敗<br>"+e.message;
}
}

loadModel();

// =====================================================
// キャンバス描画
// =====================================================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

let drawing=false;

function getPos(e){
const rect = canvas.getBoundingClientRect();

if(e.touches){
return {
x:(e.touches[0].clientX-rect.left)*(canvas.width/rect.width),
y:(e.touches[0].clientY-rect.top)*(canvas.height/rect.height)
};
}else{
return {
x:(e.clientX-rect.left)*(canvas.width/rect.width),
y:(e.clientY-rect.top)*(canvas.height/rect.height)
};
}
}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
canvas.addEventListener("mouseup",end);
canvas.addEventListener("mouseleave",end);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",move);
canvas.addEventListener("touchend",end);

function start(e){
drawing=true;
draw(e);
}

function move(e){
if(!drawing)return;
draw(e);
}

function end(){
drawing=false;
ctx.beginPath();
}

function draw(e){
e.preventDefault();

const p=getPos(e);

ctx.lineWidth=20;
ctx.lineCap="round";
ctx.strokeStyle="white";

ctx.lineTo(p.x,p.y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(p.x,p.y);
}

// =====================================================
// 消去
// =====================================================
function clearCanvas(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);
document.getElementById("result").innerHTML="?";
}

// =====================================================
// 前処理
// =====================================================
function preprocess(){
return tf.tidy(()=>{

let img=tf.browser.fromPixels(canvas,1);

img=tf.image.resizeBilinear(img,[28,28]);

img=img.toFloat().div(255.0);

img=img.expandDims(0);

return img;

});
}

// =====================================================
// 認識
// =====================================================
async function predict(){

if(!model){
alert("モデル未読込");
return;
}

const input=preprocess();

let output=model.predict ?
model.predict(input) :
model.execute(input);

const data=await output.data();

let max=data[0];
let idx=0;

for(let i=1;i<10;i++){
if(data[i]>max){
max=data[i];
idx=i;
}
}

document.getElementById("result").innerHTML=idx;

input.dispose();
output.dispose();
}

// =====================================================
</script>

</body>
</html>
