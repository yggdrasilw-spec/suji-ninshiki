<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>手書き数字認識（MNIST最適化版）</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<style>
body{
font-family:sans-serif;
background:#f7f7f7;
text-align:center;
padding:20px;
margin:0;
}

#wrap{
max-width:560px;
margin:auto;
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
}

h1{
margin:0;
color:#ff7043;
}

p{
margin:6px 0 14px;
color:#666;
}

#board{
position:relative;
width:100%;
max-width:500px;
margin:auto;
}

canvas{
touch-action:none;
width:100%;
height:220px;
display:block;
border-radius:12px;
}

#canvas{
background:#fff;
border:3px solid #ffccbc;
}

#overlay{
position:absolute;
left:0;
top:0;
pointer-events:none;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:999px;
background:#ddd;
margin-top:12px;
cursor:pointer;
}

#msg{
font-weight:bold;
margin:12px 0;
}

#result{
font-size:64px;
font-weight:bold;
color:#ff7043;
}

#mini{
font-size:14px;
color:#666;
line-height:1.6;
margin-top:8px;
}

#debug{
margin-top:18px;
display:flex;
gap:16px;
justify-content:center;
flex-wrap:wrap;
}

.debugBox{
background:#fafafa;
padding:10px;
border-radius:12px;
border:1px solid #eee;
}

.debugBox canvas{
width:96px;
height:96px;
image-rendering:pixelated;
border:1px solid #ccc;
background:#fff;
}

.small{
font-size:13px;
color:#666;
margin-bottom:6px;
}
</style>
</head>

<body>

<div id="wrap">

<h1>✏️ 手書き数字認識</h1>
<p>MNIST最適化版</p>

<div id="msg">モデル読み込み中...</div>

<div id="board">
<canvas id="canvas" width="500" height="220"></canvas>
<canvas id="overlay" width="500" height="220"></canvas>
</div>

<button onclick="clearCanvas()">🗑 消す</button>

<div id="result">?</div>

<div id="mini">
十の位から書いてください
</div>

<div id="debug">

<div class="debugBox">
<div class="small">十の位へ送信</div>
<canvas id="debugTens"
width="28"
height="28"></canvas>
</div>

<div class="debugBox">
<div class="small">一の位へ送信</div>
<canvas id="debugOnes"
width="28"
height="28"></canvas>
</div>

</div>
</div>

<script>

// =====================
// model
// =====================
let model;

// =====================
// canvas
// =====================
const canvas =
  document.getElementById("canvas");

const ctx =
  canvas.getContext("2d");

const overlay =
  document.getElementById("overlay");

const octx =
  overlay.getContext("2d");

// =====================
// debug canvas
// =====================
const debugTens =
  document.getElementById("debugTens");

const debugOnes =
  document.getElementById("debugOnes");

const dctxT =
  debugTens.getContext("2d");

const dctxO =
  debugOnes.getContext("2d");

// =====================
// ui
// =====================
const msg =
  document.getElementById("msg");

const result =
  document.getElementById("result");

const mini =
  document.getElementById("mini");

// =====================
// mask canvas
// =====================
const maskCanvas =
  document.createElement("canvas");

maskCanvas.width = 500;
maskCanvas.height = 220;

const maskCtx =
  maskCanvas.getContext("2d");

// =====================
ctx.fillStyle = "white";

ctx.fillRect(
  0,
  0,
  500,
  220
);

// =====================
let drawing = false;

let strokeCount = 0;

let tensDigit = null;
let onesDigit = null;

let stroke1Box = null;
let stroke2Box = null;

let minX, maxX, minY, maxY;

// =====================
const TOUCH_THRESHOLD = 20;

// =====================
let stroke1Points = [];
let stroke2Points = [];

// =====================
async function loadModel(){

  try{

    model =
      await tf.loadGraphModel(
        "./model/model.json"
      );

    msg.innerHTML =
      "✅ モデル読み込み成功";

  }catch(e){

    console.error(e);

    msg.innerHTML =
      "❌ モデル読み込み失敗";
  }
}

loadModel();

// =====================
function resetBox(){

  minX = 9999;
  minY = 9999;

  maxX = -1;
  maxY = -1;
}

// =====================
function updateBox(x,y){

  if(x < minX) minX = x;
  if(y < minY) minY = y;

  if(x > maxX) maxX = x;
  if(y > maxY) maxY = y;
}

// =====================
function getRawBox(){

  return{

    x:minX,
    y:minY,

    w:Math.max(
      8,
      maxX - minX
    ),

    h:Math.max(
      8,
      maxY - minY
    )
  };
}

// =====================
function expandBox(b){

  const padX =
    Math.floor(b.w * 0.20);

  const padY =
    Math.floor(b.h * 0.20);

  let x = b.x - padX;
  let y = b.y - padY;

  let w = b.w + padX * 2;
  let h = b.h + padY * 2;

  if(x < 0) x = 0;
  if(y < 0) y = 0;

  if(x + w > 500){
    w = 500 - x;
  }

  if(y + h > 220){
    h = 220 - y;
  }

  return{
    x,y,w,h
  };
}

// =====================
function mergeBox(a,b){

  const x =
    Math.min(a.x,b.x);

  const y =
    Math.min(a.y,b.y);

  const r =
    Math.max(
      a.x+a.w,
      b.x+b.w
    );

  const bt =
    Math.max(
      a.y+a.h,
      b.y+b.h
    );

  return{
    x,
    y,
    w:r-x,
    h:bt-y
  };
}

// =====================
function minDistanceBetweenStrokes(
  points1,
  points2
){

  let min = 99999;

  for(let p of points2){

    for(let q of points1){

      const d =
        Math.hypot(
          p.x - q.x,
          p.y - q.y
        );

      if(d < min){
        min = d;
      }

      if(min < 2){
        return min;
      }
    }
  }

  return min;
}

// =====================
function getPos(e){

  const rect =
    canvas.getBoundingClientRect();

  if(
    e.touches &&
    e.touches.length
  ){

    return{

      x:
      (e.touches[0].clientX
      - rect.left)
      * (500 / rect.width),

      y:
      (e.touches[0].clientY
      - rect.top)
      * (220 / rect.height)
    };
  }

  return{

    x:
    (e.clientX - rect.left)
    * (500 / rect.width),

    y:
    (e.clientY - rect.top)
    * (220 / rect.height)
  };
}

// =====================
canvas.addEventListener(
  "mousedown",
  start
);

canvas.addEventListener(
  "mousemove",
  move
);

canvas.addEventListener(
  "mouseup",
  end
);

canvas.addEventListener(
  "mouseleave",
  end
);

canvas.addEventListener(
  "touchstart",
  start,
  {passive:false}
);

canvas.addEventListener(
  "touchmove",
  move,
  {passive:false}
);

canvas.addEventListener(
  "touchend",
  end,
  {passive:false}
);

// =====================
function start(e){

  drawing = true;

  resetBox();

  const p = getPos(e);

  updateBox(p.x,p.y);

  pushPoint(p.x,p.y);

  ctx.beginPath();

  ctx.arc(
    p.x,
    p.y,
    8,
    0,
    Math.PI * 2
  );

  ctx.fillStyle = "black";
  ctx.fill();

  ctx.beginPath();

  ctx.moveTo(
    p.x,
    p.y
  );
}

// =====================
function move(e){

  if(!drawing) return;

  draw(e);
}

// =====================
function draw(e){

  e.preventDefault();

  const p = getPos(e);

  updateBox(p.x,p.y);

  pushPoint(p.x,p.y);

  ctx.lineWidth = 20;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "black";

  ctx.lineTo(
    p.x,
    p.y
  );

  ctx.stroke();

  ctx.beginPath();

  ctx.moveTo(
    p.x,
    p.y
  );
}

// =====================
function pushPoint(x,y){

  if(strokeCount === 0){

    stroke1Points.push({
      x,y
    });

  }else{

    stroke2Points.push({
      x,y
    });
  }
}

// =====================
async function end(){

  if(!drawing) return;

  drawing = false;

  ctx.beginPath();

  strokeCount++;

  const box =
    expandBox(
      getRawBox()
    );

  // =====================
  // 1 stroke
  // =====================
  if(strokeCount === 1){

    stroke1Box = box;

    drawBoxes();

    tensDigit =
      await predict(
        stroke1Box,
        "tens",
        false
      );

    result.innerHTML =
      tensDigit;

    mini.innerHTML =
      "十の位 仮認識 = "
      + tensDigit;

    return;
  }

  // =====================
  // 2 stroke
  // =====================
  if(strokeCount === 2){

    const dist =
      minDistanceBetweenStrokes(
        stroke1Points,
        stroke2Points
      );

    const touching =
      dist < TOUCH_THRESHOLD;

    if(touching){

      stroke1Box =
        mergeBox(
          stroke1Box,
          box
        );

      drawBoxes();

      tensDigit =
        await predict(
          stroke1Box,
          "tens",
          false
        );

      result.innerHTML =
        tensDigit;

      mini.innerHTML =
        "十の位 更新 = "
        + tensDigit;

    }else{

      // =====================
      // tens mask
      // =====================
      maskTensRegion();

      stroke2Box = box;

      drawBoxes();

      onesDigit =
        await predict(
          stroke2Box,
          "ones",
          true
        );

      result.innerHTML =
        (tensDigit * 10)
        + onesDigit;

      mini.innerHTML =
        "十の位確定 / 一の位 = "
        + onesDigit;
    }

    return;
  }

  // =====================
  // 3+
  // =====================
  if(!stroke2Box){

    stroke2Box = box;

  }else{

    stroke2Box =
      mergeBox(
        stroke2Box,
        box
      );
  }

  drawBoxes();

  onesDigit =
    await predict(
      stroke2Box,
      "ones",
      true
    );

  result.innerHTML =
    (tensDigit * 10)
    + onesDigit;

  mini.innerHTML = "確定";
}

// =====================
// mask actual tens stroke
// =====================
function maskTensRegion(){

  maskCtx.clearRect(
    0,
    0,
    500,
    220
  );

  if(
    stroke1Points.length < 2
  ){
    return;
  }

  maskCtx.strokeStyle =
    "black";

  maskCtx.lineWidth = 20;

  maskCtx.lineCap =
    "round";

  maskCtx.lineJoin =
    "round";

  maskCtx.beginPath();

  maskCtx.moveTo(
    stroke1Points[0].x,
    stroke1Points[0].y
  );

  for(
    let i=1;
    i<stroke1Points.length;
    i++
  ){

    maskCtx.lineTo(
      stroke1Points[i].x,
      stroke1Points[i].y
    );
  }

  maskCtx.stroke();
}

// =====================
function drawBoxes(){

  octx.clearRect(
    0,
    0,
    500,
    220
  );

  if(stroke1Box){
    rect(
      stroke1Box,
      "#00e676"
    );
  }

  if(stroke2Box){
    rect(
      stroke2Box,
      "#ff5252"
    );
  }
}

// =====================
function rect(b,c){

  octx.strokeStyle = c;

  octx.lineWidth = 2;

  octx.setLineDash([8,5]);

  octx.strokeRect(
    b.x,
    b.y,
    b.w,
    b.h
  );

  octx.setLineDash([]);
}

// =====================
// build masked canvas
// =====================
function buildMaskedCanvas(
  excludeMasked
){

  const temp =
    document.createElement(
      "canvas"
    );

  temp.width = 500;
  temp.height = 220;

  const tctx =
    temp.getContext("2d");

  tctx.fillStyle =
    "white";

  tctx.fillRect(
    0,
    0,
    500,
    220
  );

  // 元canvas
  tctx.drawImage(
    canvas,
    0,
    0
  );

  // =====================
  // tens mask remove
  // =====================
  if(excludeMasked){

    tctx.save();

    tctx.globalCompositeOperation =
      "destination-out";

    tctx.drawImage(
      maskCanvas,
      0,
      0
    );

    tctx.restore();
  }

  return temp;
}

// =====================
function preprocess(
  box,
  target,
  excludeMasked
){

  return tf.tidy(() => {

    const srcCanvas =
      buildMaskedCanvas(
        excludeMasked
      );

    let img =
      tf.browser.fromPixels(
        srcCanvas,
        1
      );

    img = tf.slice(
      img,
      [
        Math.floor(box.y),
        Math.floor(box.x),
        0
      ],
      [
        Math.max(
          1,
          Math.floor(box.h)
        ),

        Math.max(
          1,
          Math.floor(box.w)
        ),

        1
      ]
    );

    const h =
      img.shape[0];

    const w =
      img.shape[1];

    // =====================
    // aspect preserve
    // =====================
    const marginRatio =
      0.20;

    const side =
      Math.max(w,h);

    const margin =
      Math.floor(
        side * marginRatio
      );

    const squareSide =
      side + margin * 2;

    let bg =
      tf.fill(
        [squareSide,squareSide,1],
        255
      ).bufferSync();

    const src =
      img.arraySync();

    const offsetX =
      Math.floor(
        (squareSide - w)/2
      );

    const offsetY =
      Math.floor(
        (squareSide - h)/2
      );

    for(let y=0;y<h;y++){

      for(let x=0;x<w;x++){

        bg.set(
          src[y][x][0],
          y + offsetY,
          x + offsetX,
          0
        );
      }
    }

    img = bg.toTensor();

    // =====================
    // resize
    // =====================
    img =
      tf.image.resizeBilinear(
        img,
        [28,28],
        true
      );

    // =====================
    // invert
    // =====================
    img =
      tf.sub(255,img);

    img =
      img.toFloat().div(255);

    // =====================
    // MNIST-like normalize
    // =====================
    img =
      tf.avgPool(
        img.expandDims(0),
        [2,2],
        [1,1],
        "same"
      ).squeeze();

    // =====================
    // adaptive threshold
    // =====================
    img =
      img.greater(0.18)
         .toFloat();

    drawDebug(
      img,
      target
    );

    img =
      img.expandDims(0);

    return img;
  });
}

// =====================
function drawDebug(t,target){

  const ctx2 =
    target === "ones"
      ? dctxO
      : dctxT;

  ctx2.clearRect(
    0,
    0,
    28,
    28
  );

  const data =
    t.dataSync();

  const imageData =
    ctx2.createImageData(
      28,
      28
    );

  for(let i=0;i<28*28;i++){

    const v =
      Math.floor(
        data[i] * 255
      );

    imageData.data[i*4+0] = v;
    imageData.data[i*4+1] = v;
    imageData.data[i*4+2] = v;
    imageData.data[i*4+3] = 255;
  }

  ctx2.putImageData(
    imageData,
    0,
    0
  );
}

// =====================
async function predict(
  box,
  target,
  excludeMasked
){

  if(!model){
    return 0;
  }

  const input =
    preprocess(
      box,
      target,
      excludeMasked
    );

  let output =
    model.predict
      ? model.predict(input)
      : model.execute(input);

  const data =
    await output.data();

  let max = data[0];
  let idx = 0;

  for(let i=1;i<10;i++){

    if(data[i] > max){

      max = data[i];
      idx = i;
    }
  }

  input.dispose();
  output.dispose();

  return idx;
}

// =====================
function clearCanvas(){

  ctx.fillStyle =
    "white";

  ctx.fillRect(
    0,
    0,
    500,
    220
  );

  octx.clearRect(
    0,
    0,
    500,
    220
  );

  dctxT.clearRect(
    0,
    0,
    28,
    28
  );

  dctxO.clearRect(
    0,
    0,
    28,
    28
  );

  maskCtx.clearRect(
    0,
    0,
    500,
    220
  );

  drawing = false;

  strokeCount = 0;

  tensDigit = null;
  onesDigit = null;

  stroke1Box = null;
  stroke2Box = null;

  stroke1Points = [];
  stroke2Points = [];

  result.innerHTML = "?";

  mini.innerHTML =
    "十の位から書いてください";
}

</script>
</body>
</html>
