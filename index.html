<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>手書き数字認識（近接判定強化版）</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<style>
body{
font-family:sans-serif;
background:#f7f7f7;
text-align:center;
padding:20px;
margin:0;
}

h1{color:#ff7043;margin-bottom:5px;}
p{color:#666;margin-top:0;}

#wrap{
max-width:520px;
margin:auto;
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
}

canvas{
background:black;
border:3px solid #ffccbc;
border-radius:12px;
touch-action:none;
width:100%;
max-width:500px;
height:220px;
}

button{
padding:12px 20px;
font-size:18px;
margin:10px 5px;
border:none;
border-radius:999px;
cursor:pointer;
}

.btn2{background:#ddd;}

#msg{
font-weight:bold;
margin:12px 0;
color:#333;
}

#result{
font-size:64px;
font-weight:bold;
color:#ff7043;
margin-top:10px;
}

#mini{
font-size:14px;
color:#777;
line-height:1.6;
margin-top:8px;
}
</style>
</head>
<body>

<div id="wrap">

<h1>✏️ 手書き数字認識</h1>
<p>近接判定強化版</p>

<div id="msg">① モデル読み込み中...</div>

<canvas id="canvas" width="500" height="220"></canvas>

<div>
<button class="btn2" onclick="clearCanvas()">🗑 消す</button>
</div>

<div id="result">?</div>
<div id="mini">十の位から書いてください</div>

</div>

<script>
let model;

// =====================================================
// モデル読み込み（既存維持）
// =====================================================
async function loadModel(){
try{
model=await tf.loadGraphModel("./model/model.json");
msg.innerHTML="✅ モデル読み込み成功";
}catch(e){
msg.innerHTML="❌ 読み込み失敗";
}
}
loadModel();

// =====================================================
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const msg=document.getElementById("msg");
const result=document.getElementById("result");
const mini=document.getElementById("mini");

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

let drawing=false;

// =====================================================
// 状態管理
// =====================================================
let phase=0;
let tensDigit=null;
let onesDigit=null;

let stroke1Box=null;
let stroke2Box=null;

// =====================================================
// 座標取得
// =====================================================
function getPos(e){

const rect=canvas.getBoundingClientRect();

if(e.touches){
return{
x:(e.touches[0].clientX-rect.left)*(canvas.width/rect.width),
y:(e.touches[0].clientY-rect.top)*(canvas.height/rect.height)
};
}

return{
x:(e.clientX-rect.left)*(canvas.width/rect.width),
y:(e.clientY-rect.top)*(canvas.height/rect.height)
};
}

// =====================================================
// ストローク矩形記録
// =====================================================
let minX,maxX,minY,maxY;

function resetBox(){
minX=9999;
minY=9999;
maxX=-1;
maxY=-1;
}

function updateBox(x,y){
if(x<minX)minX=x;
if(y<minY)minY=y;
if(x>maxX)maxX=x;
if(y>maxY)maxY=y;
}

function getCurrentBox(){
return{
x:minX,
y:minY,
w:maxX-minX,
h:maxY-minY
};
}

// =====================================================
// 近接判定強化版
//
// 以前: 接触のみ
// 今回: ギリギリ近い場合も同数字扱い
//
// 判定内容
// ① 重なり
// ② 近接距離
// ③ 横方向の自然な7のズレ許容
// =====================================================
function isTouch(a,b){

const overlapPad=12;

// 接触判定
const overlap = !(
a.x+a.w+overlapPad < b.x ||
b.x+b.w+overlapPad < a.x ||
a.y+a.h+overlapPad < b.y ||
b.y+b.h+overlapPad < a.y
);

if(overlap)return true;

// ----------------------------
// 最短距離計算
// ----------------------------
const dx=Math.max(
a.x-(b.x+b.w),
b.x-(a.x+a.w),
0
);

const dy=Math.max(
a.y-(b.y+b.h),
b.y-(a.y+a.h),
0
);

const dist=Math.sqrt(dx*dx+dy*dy);

// ----------------------------
// ギリギリ近い定義
//
// 数字サイズに応じて可変
// 小さい字なら狭く
// 大きい字なら広く
// ----------------------------
const sizeBase=Math.max(a.w,a.h,b.w,b.h);
const nearLimit=Math.max(18,sizeBase*0.35);

if(dist<=nearLimit)return true;

// ----------------------------
// 7対策
// 横ズレ小 + 縦連続なら接触扱い
// ----------------------------
const centerAX=a.x+a.w/2;
const centerBX=b.x+b.w/2;
const centerAY=a.y+a.h/2;
const centerBY=b.y+b.h/2;

const cx=Math.abs(centerAX-centerBX);
const cy=Math.abs(centerAY-centerBY);

if(cx<28 && cy<65)return true;

return false;
}

// =====================================================
// イベント
// =====================================================
canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
canvas.addEventListener("mouseup",end);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",move);
canvas.addEventListener("touchend",end);

// =====================================================
function start(e){

if(phase===3)return;

drawing=true;
resetBox();
draw(e);
}

function move(e){
if(!drawing)return;
draw(e);
}

async function end(){

if(!drawing)return;

drawing=false;
ctx.beginPath();

const box=getCurrentBox();

// 1本目
if(phase===0){

stroke1Box=box;

tensDigit=await predict();

result.innerHTML=tensDigit;
mini.innerHTML="十の位 仮認識 = "+tensDigit;

phase=1;
return;
}

// 2本目
if(phase===1){

stroke2Box=box;

if(isTouch(stroke1Box,stroke2Box)){

tensDigit=await predict();

result.innerHTML=tensDigit;
mini.innerHTML="十の位 再認識確定 = "+tensDigit+"<br>一の位を書いてください";

phase=2;

}else{

onesDigit=await predict();

result.innerHTML=(tensDigit*10)+onesDigit;
mini.innerHTML="十="+tensDigit+"確定 / 一="+onesDigit+"仮";

phase=2;
}

return;
}

// 3本目
if(phase===2){

onesDigit=await predict();

result.innerHTML=(tensDigit*10)+onesDigit;
mini.innerHTML="十="+tensDigit+" / 一="+onesDigit+"確定";

phase=3;
}
}

// =====================================================
function draw(e){

e.preventDefault();

const p=getPos(e);

updateBox(p.x,p.y);

ctx.lineWidth=20;
ctx.lineCap="round";
ctx.strokeStyle="white";

ctx.lineTo(p.x,p.y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(p.x,p.y);
}

// =====================================================
function clearCanvas(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

result.innerHTML="?";
mini.innerHTML="十の位から書いてください";

phase=0;
tensDigit=null;
onesDigit=null;
stroke1Box=null;
stroke2Box=null;
}

// =====================================================
// 前処理（既存維持）
// =====================================================
function preprocess(){
return tf.tidy(()=>{

let img=tf.browser.fromPixels(canvas,1);
img=tf.image.resizeBilinear(img,[28,28]);
img=img.toFloat().div(255.0);
img=img.expandDims(0);

return img;

});
}

// =====================================================
// 認識（既存維持）
// =====================================================
async function predict(){

if(!model)return 0;

const input=preprocess();

let output=model.predict ?
model.predict(input) :
model.execute(input);

const data=await output.data();

let max=data[0];
let idx=0;

for(let i=1;i<10;i++){
if(data[i]>max){
max=data[i];
idx=i;
}
}

input.dispose();
output.dispose();

return idx;
}
</script>

</body>
</html>
