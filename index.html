<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>手書き数字認識（不具合修正版）</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<style>
body{
font-family:sans-serif;
background:#f7f7f7;
text-align:center;
padding:20px;
margin:0;
}
h1{color:#ff7043;margin-bottom:5px;}
p{color:#666;margin-top:0;}

#wrap{
max-width:520px;
margin:auto;
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
}

#board{
position:relative;
width:100%;
max-width:500px;
margin:auto;
}

canvas{
touch-action:none;
width:100%;
height:220px;
border-radius:12px;
display:block;
}

#canvas{
background:white;
border:3px solid #ffccbc;
position:relative;
z-index:1;
}

#overlay{
position:absolute;
left:0;
top:0;
z-index:2;
pointer-events:none;
}

button{
padding:12px 20px;
font-size:18px;
margin:10px 5px;
border:none;
border-radius:999px;
cursor:pointer;
}

.btn2{background:#ddd;}

#msg{
font-weight:bold;
margin:12px 0;
color:#333;
}

#result{
font-size:64px;
font-weight:bold;
color:#ff7043;
margin-top:10px;
}

#mini{
font-size:14px;
color:#777;
line-height:1.6;
margin-top:8px;
}
</style>
</head>
<body>

<div id="wrap">

<h1>✏️ 手書き数字認識</h1>
<p>不具合修正版</p>

<div id="msg">① モデル読み込み中...</div>

<div id="board">
<canvas id="canvas" width="500" height="220"></canvas>
<canvas id="overlay" width="500" height="220"></canvas>
</div>

<div>
<button class="btn2" onclick="clearCanvas()">🗑 消す</button>
</div>

<div id="result">?</div>
<div id="mini">十の位から書いてください</div>

</div>

<script>
let model;

// =====================================================
// モデル読み込み
// =====================================================
async function loadModel(){
try{
model = await tf.loadGraphModel("./model/model.json");
msg.innerHTML = "✅ モデル読み込み成功";
}catch(e){
msg.innerHTML = "❌ 読み込み失敗";
}
}
loadModel();

// =====================================================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const overlay = document.getElementById("overlay");
const octx = overlay.getContext("2d");

const msg = document.getElementById("msg");
const result = document.getElementById("result");
const mini = document.getElementById("mini");

// 白背景
ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

// =====================================================
// 状態
// =====================================================
let drawing=false;
let phase=0;

let tensDigit=null;
let onesDigit=null;

let stroke1Box=null;
let stroke2Box=null;

// =====================================================
// 座標取得
// =====================================================
function getPos(e){

const rect=canvas.getBoundingClientRect();

if(e.touches){
return{
x:(e.touches[0].clientX-rect.left)*(canvas.width/rect.width),
y:(e.touches[0].clientY-rect.top)*(canvas.height/rect.height)
};
}

return{
x:(e.clientX-rect.left)*(canvas.width/rect.width),
y:(e.clientY-rect.top)*(canvas.height/rect.height)
};
}

// =====================================================
// ストローク矩形
// =====================================================
let minX,maxX,minY,maxY;

function resetBox(){
minX=9999;
minY=9999;
maxX=-1;
maxY=-1;
}

function updateBox(x,y){
if(x<minX)minX=x;
if(y<minY)minY=y;
if(x>maxX)maxX=x;
if(y>maxY)maxY=y;
}

function getCurrentBox(){
return{
x:minX,
y:minY,
w:maxX-minX,
h:maxY-minY
};
}

// =====================================================
// 余白付き矩形
// =====================================================
function expandBox(box,pad=20){

let x=box.x-pad;
let y=box.y-pad;
let w=box.w+pad*2;
let h=box.h+pad*2;

if(x<0)x=0;
if(y<0)y=0;
if(x+w>canvas.width)w=canvas.width-x;
if(y+h>canvas.height)h=canvas.height-y;

return{x,y,w,h};
}

// =====================================================
// 接触判定
// =====================================================
function isTouch(a,b){

const pad=14;

return !(
a.x+a.w+pad < b.x ||
b.x+b.w+pad < a.x ||
a.y+a.h+pad < b.y ||
b.y+b.h+pad < a.y
);
}

// =====================================================
// 一の位候補枠
// =====================================================
function getOnesArea(){

if(stroke2Box)return stroke2Box;

if(!stroke1Box)return null;

let x=stroke1Box.x+stroke1Box.w+10;
let w=canvas.width-x-10;

if(w<20)return null;

return{
x:x,
y:10,
w:w,
h:canvas.height-20
};
}

// =====================================================
// 枠描画
// =====================================================
function drawBoxes(){

octx.clearRect(0,0,overlay.width,overlay.height);

// 緑枠
if(stroke1Box){
drawRect(stroke1Box,"#00e676");
}

// 赤枠
const red=getOnesArea();
if(red){
drawRect(red,"#ff5252");
}
}

function drawRect(box,color){

octx.strokeStyle=color;
octx.lineWidth=2;
octx.setLineDash([8,5]);
octx.strokeRect(box.x,box.y,box.w,box.h);
octx.setLineDash([]);
}

// =====================================================
// イベント
// =====================================================
canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
canvas.addEventListener("mouseup",end);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",move);
canvas.addEventListener("touchend",end);

// =====================================================
function start(e){

if(phase===3)return;

drawing=true;
resetBox();
draw(e);
}

function move(e){
if(!drawing)return;
draw(e);
}

async function end(){

if(!drawing)return;

drawing=false;
ctx.beginPath();

const raw=getCurrentBox();

if(raw.w<=0 || raw.h<=0)return;

const box=expandBox(raw,20);

// -------------------------
// 1本目
// -------------------------
if(phase===0){

stroke1Box=box;
drawBoxes();

tensDigit=await predict(stroke1Box);

result.innerHTML=tensDigit;
mini.innerHTML="十の位 仮認識 = "+tensDigit;

phase=1;
return;
}

// -------------------------
// 2本目
// -------------------------
if(phase===1){

stroke2Box=box;

if(isTouch(stroke1Box,stroke2Box)){

stroke1Box=mergeBox(stroke1Box,stroke2Box);
stroke2Box=null;

drawBoxes();

tensDigit=await predict(stroke1Box);

result.innerHTML=tensDigit;
mini.innerHTML="十の位 再認識確定 = "+tensDigit+"<br>一の位を書いてください";

phase=2;

}else{

drawBoxes();

onesDigit=await predict(stroke2Box);

result.innerHTML=(tensDigit*10)+onesDigit;
mini.innerHTML="十="+tensDigit+" / 一="+onesDigit+" 仮";

phase=2;
}

return;
}

// -------------------------
// 3本目
// -------------------------
if(phase===2){

stroke2Box=mergeBox(stroke2Box,box);

drawBoxes();

onesDigit=await predict(stroke2Box);

result.innerHTML=(tensDigit*10)+onesDigit;
mini.innerHTML="十="+tensDigit+" / 一="+onesDigit+" 確定";

phase=3;
}
}

// =====================================================
function mergeBox(a,b){

const x=Math.min(a.x,b.x);
const y=Math.min(a.y,b.y);

const r=Math.max(a.x+a.w,b.x+b.w);
const bt=Math.max(a.y+a.h,b.y+b.h);

return{
x:x,
y:y,
w:r-x,
h:bt-y
};
}

// =====================================================
// 描画
// =====================================================
function draw(e){

e.preventDefault();

const p=getPos(e);

updateBox(p.x,p.y);

ctx.lineWidth=20;
ctx.lineCap="round";
ctx.strokeStyle="black";

ctx.lineTo(p.x,p.y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(p.x,p.y);
}

// =====================================================
// 消去
// =====================================================
function clearCanvas(){

ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

octx.clearRect(0,0,overlay.width,overlay.height);

result.innerHTML="?";
mini.innerHTML="十の位から書いてください";

phase=0;
tensDigit=null;
onesDigit=null;
stroke1Box=null;
stroke2Box=null;
}

// =====================================================
// 安定版 preprocess
//
// box切り出し
// ↓
// resizeWithPadで正方形化
// ↓
// 28x28
// ↓
// 白黒反転
// =====================================================
function preprocess(box){

return tf.tidy(()=>{

let img=tf.browser.fromPixels(canvas,1);

// 切り出し
img=tf.slice(
img,
[Math.floor(box.y),Math.floor(box.x),0],
[Math.floor(box.h),Math.floor(box.w),1]
);

// 正方形化（40x40で余白付き）
img=tf.image.resizeWithPad(img,40,40);

// 28x28へ
img=tf.image.resizeBilinear(img,[28,28]);

// 白黒反転
img=tf.sub(255,img);

// 正規化
img=img.toFloat().div(255.0);

// batch
img=img.expandDims(0);

return img;

});
}

// =====================================================
// 認識
// =====================================================
async function predict(box){

if(!model)return 0;

const input=preprocess(box);

let output=model.predict ?
model.predict(input) :
model.execute(input);

const data=await output.data();

let max=data[0];
let idx=0;

for(let i=1;i<10;i++){
if(data[i]>max){
max=data[i];
idx=i;
}
}

input.dispose();
output.dispose();

return idx;
}
</script>

</body>
</html>
