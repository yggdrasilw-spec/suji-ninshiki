<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>手書き数字認識</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
  text-align:center;
}

#wrapper{
  max-width:560px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
}

#board{
  position:relative;
  width:100%;
  max-width:500px;
  margin:auto;
}

canvas{
  touch-action:none;
}

#canvas,
#overlay{
  width:100%;
  height:220px;
  border-radius:12px;
}

#canvas{
  background:white;
  border:3px solid #ffccbc;
}

#overlay{
  position:absolute;
  left:0;
  top:0;
  pointer-events:none;
}

button{
  margin-top:14px;
  padding:12px 24px;
  border:none;
  border-radius:999px;
  font-size:18px;
  cursor:pointer;
}

#result{
  font-size:64px;
  font-weight:bold;
  margin-top:12px;
  color:#ff7043;
}

#msg{
  margin:12px 0;
  font-weight:bold;
}

#debug{
  display:flex;
  justify-content:center;
  gap:16px;
  margin-top:20px;
  flex-wrap:wrap;
}

.debugBox{
  background:#fafafa;
  border:1px solid #ddd;
  border-radius:12px;
  padding:10px;
}

.debugBox canvas{
  width:96px;
  height:96px;
  image-rendering:pixelated;
  background:white;
  border:1px solid #ccc;
}

.small{
  font-size:12px;
  color:#666;
  margin-bottom:6px;
}
</style>
</head>

<body>

<div id="wrapper">

<h2>✏️ 手書き数字認識</h2>

<div id="msg">
モデル読み込み中...
</div>

<div id="board">
<canvas id="canvas" width="500" height="220"></canvas>
<canvas id="overlay" width="500" height="220"></canvas>
</div>

<button onclick="clearCanvas()">
🗑 消す
</button>

<div id="result">?</div>

<div id="debug">

<div class="debugBox">
<div class="small">十の位</div>
<canvas id="debugTens" width="28" height="28"></canvas>
</div>

<div class="debugBox">
<div class="small">一の位</div>
<canvas id="debugOnes" width="28" height="28"></canvas>
</div>

</div>

</div>

<script>

// ======================
// model
// ======================
let model;

// ======================
// canvas
// ======================
const canvas =
  document.getElementById("canvas");

const ctx =
  canvas.getContext("2d");

const overlay =
  document.getElementById("overlay");

const octx =
  overlay.getContext("2d");

// ======================
// debug
// ======================
const debugTens =
  document.getElementById("debugTens");

const debugOnes =
  document.getElementById("debugOnes");

const dctxT =
  debugTens.getContext("2d");

const dctxO =
  debugOnes.getContext("2d");

// ======================
const msg =
  document.getElementById("msg");

const result =
  document.getElementById("result");

// ======================
// mask canvas
// ======================
const maskCanvas =
  document.createElement("canvas");

maskCanvas.width = 500;
maskCanvas.height = 220;

const maskCtx =
  maskCanvas.getContext("2d");

// ======================
ctx.fillStyle = "white";
ctx.fillRect(0,0,500,220);

// ======================
let drawing = false;

let minX,minY,maxX,maxY;

let strokeCount = 0;

let tensDigit = null;
let onesDigit = null;

let stroke1Box = null;
let stroke2Box = null;

// ======================
// 全stroke保持
// ======================
let allStrokes = [];

let currentStroke = [];

// ======================
// 十の位stroke
// ======================
let tensStrokeSets = [];

// ======================
const TOUCH_THRESHOLD = 20;

// ======================
async function loadModel(){

  try{

    model =
      await tf.loadGraphModel(
        "./model/model.json"
      );

    msg.innerHTML =
      "✅ モデル読み込み成功";

  }catch(e){

    console.error(e);

    msg.innerHTML =
      "❌ モデル読み込み失敗";
  }
}

loadModel();

// ======================
function resetBox(){

  minX = 9999;
  minY = 9999;

  maxX = -1;
  maxY = -1;
}

// ======================
function updateBox(x,y){

  if(x < minX) minX = x;
  if(y < minY) minY = y;

  if(x > maxX) maxX = x;
  if(y > maxY) maxY = y;
}

// ======================
function getRawBox(){

  return{

    x:minX,
    y:minY,

    w:Math.max(
      8,
      maxX - minX
    ),

    h:Math.max(
      8,
      maxY - minY
    )
  };
}

// ======================
function expandBox(b){

  const padX =
    Math.floor(b.w * 0.20);

  const padY =
    Math.floor(b.h * 0.20);

  let x = b.x - padX;
  let y = b.y - padY;

  let w = b.w + padX*2;
  let h = b.h + padY*2;

  if(x < 0) x = 0;
  if(y < 0) y = 0;

  if(x+w > 500){
    w = 500 - x;
  }

  if(y+h > 220){
    h = 220 - y;
  }

  return{x,y,w,h};
}

// ======================
function mergeBox(a,b){

  const x =
    Math.min(a.x,b.x);

  const y =
    Math.min(a.y,b.y);

  const r =
    Math.max(a.x+a.w,b.x+b.w);

  const bt =
    Math.max(a.y+a.h,b.y+b.h);

  return{
    x,
    y,
    w:r-x,
    h:bt-y
  };
}

// ======================
function getPos(e){

  const rect =
    canvas.getBoundingClientRect();

  if(
    e.touches &&
    e.touches.length
  ){

    return{

      x:
      (e.touches[0].clientX
      - rect.left)
      * (500/rect.width),

      y:
      (e.touches[0].clientY
      - rect.top)
      * (220/rect.height)
    };
  }

  return{

    x:
    (e.clientX - rect.left)
    * (500/rect.width),

    y:
    (e.clientY - rect.top)
    * (220/rect.height)
  };
}

// ======================
canvas.addEventListener(
  "mousedown",
  start
);

canvas.addEventListener(
  "mousemove",
  move
);

canvas.addEventListener(
  "mouseup",
  end
);

canvas.addEventListener(
  "mouseleave",
  end
);

canvas.addEventListener(
  "touchstart",
  start,
  {passive:false}
);

canvas.addEventListener(
  "touchmove",
  move,
  {passive:false}
);

canvas.addEventListener(
  "touchend",
  end,
  {passive:false}
);

// ======================
function start(e){

  drawing = true;

  currentStroke = [];

  resetBox();

  const p = getPos(e);

  updateBox(p.x,p.y);

  currentStroke.push({
    x:p.x,
    y:p.y
  });

  ctx.beginPath();

  ctx.arc(
    p.x,
    p.y,
    8,
    0,
    Math.PI*2
  );

  ctx.fillStyle = "black";
  ctx.fill();

  ctx.beginPath();

  ctx.moveTo(
    p.x,
    p.y
  );
}

// ======================
function move(e){

  if(!drawing) return;

  draw(e);
}

// ======================
function draw(e){

  e.preventDefault();

  const p = getPos(e);

  updateBox(p.x,p.y);

  currentStroke.push({
    x:p.x,
    y:p.y
  });

  ctx.lineWidth = 20;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "black";

  ctx.lineTo(
    p.x,
    p.y
  );

  ctx.stroke();

  ctx.beginPath();

  ctx.moveTo(
    p.x,
    p.y
  );
}

// ======================
function minDistance(
  s1,
  s2
){

  let min = 99999;

  for(let p of s1){

    for(let q of s2){

      const d =
        Math.hypot(
          p.x-q.x,
          p.y-q.y
        );

      if(d < min){
        min = d;
      }
    }
  }

  return min;
}

// ======================
async function end(){

  if(!drawing) return;

  drawing = false;

  ctx.beginPath();

  const box =
    expandBox(
      getRawBox()
    );

  allStrokes.push({
    points:[...currentStroke],
    box
  });

  // ====================
  // first stroke
  // ====================
  if(strokeCount === 0){

    stroke1Box = box;

    tensStrokeSets.push(
      [...currentStroke]
    );

    drawBoxes();

    tensDigit =
      await predict(
        stroke1Box,
        false,
        "tens"
      );

    result.innerHTML =
      tensDigit;

    strokeCount++;
    return;
  }

  // ====================
  // second stroke
  // ====================
  if(strokeCount === 1){

    const dist =
      minDistance(
        currentStroke,
        tensStrokeSets[
          tensStrokeSets.length-1
        ]
      );

    // ====================
    // same digit
    // ====================
    if(dist < TOUCH_THRESHOLD){

      tensStrokeSets.push(
        [...currentStroke]
      );

      stroke1Box =
        mergeBox(
          stroke1Box,
          box
        );

      drawBoxes();

      tensDigit =
        await predict(
          stroke1Box,
          false,
          "tens"
        );

      result.innerHTML =
        tensDigit;

      strokeCount++;
      return;
    }

    // ====================
    // next digit
    // ====================
    stroke2Box = box;

    buildMask();

    drawBoxes();

    onesDigit =
      await predict(
        stroke2Box,
        true,
        "ones"
      );

    result.innerHTML =
      (tensDigit*10)
      + onesDigit;

    strokeCount++;
    return;
  }

  // ====================
  // ones continue
  // ====================
  stroke2Box =
    mergeBox(
      stroke2Box,
      box
    );

  drawBoxes();

  onesDigit =
    await predict(
      stroke2Box,
      true,
      "ones"
    );

  result.innerHTML =
    (tensDigit*10)
    + onesDigit;

  strokeCount++;
}

// ======================
function buildMask(){

  maskCtx.clearRect(
    0,
    0,
    500,
    220
  );

  maskCtx.strokeStyle =
    "black";

  // 少し太め
  maskCtx.lineWidth = 28;

  maskCtx.lineCap =
    "round";

  maskCtx.lineJoin =
    "round";

  for(
    let stroke of
    tensStrokeSets
  ){

    if(stroke.length < 2){
      continue;
    }

    maskCtx.beginPath();

    maskCtx.moveTo(
      stroke[0].x,
      stroke[0].y
    );

    for(let i=1;i<stroke.length;i++){

      maskCtx.lineTo(
        stroke[i].x,
        stroke[i].y
      );
    }

    maskCtx.stroke();
  }
}

// ======================
function buildMaskedCanvas(){

  const temp =
    document.createElement(
      "canvas"
    );

  temp.width = 500;
  temp.height = 220;

  const tctx =
    temp.getContext("2d");

  tctx.fillStyle = "white";

  tctx.fillRect(
    0,
    0,
    500,
    220
  );

  tctx.drawImage(
    canvas,
    0,
    0
  );

  // ====================
  // mask apply
  // ====================
  const maskData =
    maskCtx.getImageData(
      0,
      0,
      500,
      220
    );

  const imgData =
    tctx.getImageData(
      0,
      0,
      500,
      220
    );

  const md =
    maskData.data;

  const id =
    imgData.data;

  for(let i=0;i<md.length;i+=4){

    if(md[i] > 0){

      id[i]   = 255;
      id[i+1] = 255;
      id[i+2] = 255;
      id[i+3] = 255;
    }
  }

  tctx.putImageData(
    imgData,
    0,
    0
  );

  return temp;
}

// ======================
function preprocess(
  box,
  excludeMasked,
  target
){

  return tf.tidy(() => {

    let srcCanvas;

    if(excludeMasked){

      srcCanvas =
        buildMaskedCanvas();

    }else{

      srcCanvas = canvas;
    }

    let img =
      tf.browser.fromPixels(
        srcCanvas,
        1
      );

    img = tf.slice(
      img,
      [
        Math.floor(box.y),
        Math.floor(box.x),
        0
      ],
      [
        Math.floor(box.h),
        Math.floor(box.w),
        1
      ]
    );

    const h =
      img.shape[0];

    const w =
      img.shape[1];

    // ====================
    // aspect ratio keep
    // ====================
    const side =
      Math.max(w,h);

    const margin =
      Math.floor(
        side * 0.20
      );

    const square =
      side + margin*2;

    let bg =
      tf.fill(
        [square,square,1],
        255
      ).bufferSync();

    const src =
      img.arraySync();

    const offsetX =
      Math.floor(
        (square-w)/2
      );

    const offsetY =
      Math.floor(
        (square-h)/2
      );

    for(let y=0;y<h;y++){

      for(let x=0;x<w;x++){

        bg.set(
          src[y][x][0],
          y+offsetY,
          x+offsetX,
          0
        );
      }
    }

    img = bg.toTensor();

    // ====================
    // resize
    // ====================
    img =
      tf.image.resizeBilinear(
        img,
        [28,28],
        true
      );

    // ====================
    // invert
    // ====================
    img =
      tf.sub(255,img);

    img =
      img.toFloat().div(255);

    // ====================
    // line normalize
    // ====================
    img =
      tf.avgPool(
        img.expandDims(0),
        [2,2],
        [1,1],
        "same"
      ).squeeze([0]);

    // ====================
    // threshold
    // ====================
    img =
      img.greater(0.16)
         .toFloat();

    drawDebug(
      img,
      target
    );

    return img.expandDims(0);
  });
}

// ======================
function drawDebug(
  t,
  target
){

  const ctx2 =
    target === "ones"
    ? dctxO
    : dctxT;

  ctx2.clearRect(
    0,
    0,
    28,
    28
  );

  const data =
    t.dataSync();

  const imageData =
    ctx2.createImageData(
      28,
      28
    );

  for(let i=0;i<28*28;i++){

    const v =
      Math.floor(
        data[i]*255
      );

    imageData.data[i*4+0]=v;
    imageData.data[i*4+1]=v;
    imageData.data[i*4+2]=v;
    imageData.data[i*4+3]=255;
  }

  ctx2.putImageData(
    imageData,
    0,
    0
  );
}

// ======================
async function predict(
  box,
  excludeMasked,
  target
){

  if(!model){
    return 0;
  }

  const input =
    preprocess(
      box,
      excludeMasked,
      target
    );

  let output;

  if(model.predict){

    output =
      model.predict(input);

  }else{

    output =
      model.execute(input);
  }

  const data =
    await output.data();

  let max =
    data[0];

  let idx = 0;

  for(let i=1;i<10;i++){

    if(data[i] > max){

      max = data[i];
      idx = i;
    }
  }

  input.dispose();
  output.dispose();

  return idx;
}

// ======================
function drawBoxes(){

  octx.clearRect(
    0,
    0,
    500,
    220
  );

  if(stroke1Box){

    drawRect(
      stroke1Box,
      "#00e676"
    );
  }

  if(stroke2Box){

    drawRect(
      stroke2Box,
      "#ff5252"
    );
  }
}

// ======================
function drawRect(
  b,
  color
){

  octx.strokeStyle =
    color;

  octx.lineWidth = 2;

  octx.setLineDash([8,5]);

  octx.strokeRect(
    b.x,
    b.y,
    b.w,
    b.h
  );

  octx.setLineDash([]);
}

// ======================
function clearCanvas(){

  ctx.fillStyle = "white";

  ctx.fillRect(
    0,
    0,
    500,
    220
  );

  octx.clearRect(
    0,
    0,
    500,
    220
  );

  dctxT.clearRect(
    0,
    0,
    28,
    28
  );

  dctxO.clearRect(
    0,
    0,
    28,
    28
  );

  maskCtx.clearRect(
    0,
    0,
    500,
    220
  );

  drawing = false;

  strokeCount = 0;

  tensDigit = null;
  onesDigit = null;

  stroke1Box = null;
  stroke2Box = null;

  allStrokes = [];

  currentStroke = [];

  tensStrokeSets = [];

  result.innerHTML = "?";
}

</script>

</body>
</html>
